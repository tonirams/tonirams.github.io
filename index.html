<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toni Rams | Official Website</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="assets/images/icon.png">

  <!-- STYLES -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="overflow-hidden" oncontextmenu="return false">

  <!-- NAVBAR -->
  <nav class="fixed top-0 left-0 w-full flex justify-between items-center px-4 md:px-6 py-4 text-xs uppercase tracking-widest z-50">

    <!-- LOGO -->
    <a href="./">
      <img src="assets/images/logoscript.png"
           class="h-5 opacity-70 hover:opacity-100 transition">
    </a>

    <!-- MENU -->
    <a href="discography/" class="opacity-50 hover:opacity-100 transition">
      Discography
    </a>
    <a href="art/" class="opacity-50 hover:opacity-100 transition">
      Lost Works
    </a>

  </nav>


  <!-- HERO -->
  <section class="relative min-h-screen flex items-center justify-center text-center px-6 overflow-hidden">

    <!-- VIDEO BACKGROUND -->
    <div class="absolute inset-0 overflow-hidden">
      <video autoplay muted loop playsinline class="w-full h-full object-cover">
        <source src="assets/videos/bgloop.webm" type="video/mp4">
      </video>
    </div>

    <!-- OVERLAY -->
    <div class="absolute inset-0 z-10 bg-black/60 pointer-events-none"></div>

    <!-- GRAINY --> 
    <svg class="absolute inset-0 w-full h-full opacity-15 pointer-events-none">
      <filter id="noise">
        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#noise)" fill="white"/>
      
    </svg>

    <!-- CONTENT -->
    <div class="relative z-10 flex flex-col items-center">

      <!-- TAGLINE -->
      <p class="text-xs md:text-sm opacity-50 italic">
        "To metal and pop, this is my works"
      </p>

      <div class="h-16"></div>

      <!-- RELEASE -->
      <p class="text-xs tracking-[0.3em] opacity-60">
        NEW RELEASE
      </p>

      <h2 class="serif text-2xl md:text-4xl uppercase tracking-wide text-white mt-2">
        We Are Living Beings Who Witness Many Lies
      </h2>

      <!-- BUTTON -->
      <a href="https://open.spotify.com/album/5J1567wf3hySYe2MwdRpMn?si=ZvyQ4SODT_u-fiD1lpwjqA"
         class="mt-6 border border-white/30 px-4 md:px-6 py-2 text-xs tracking-widest hover:bg-white hover:text-black transition duration-300 active:scale-95">
         LISTEN
      </a>

      <!-- SOCIALS -->
      <div class="mt-6 flex gap-6 opacity-40 hover:opacity-100 transition text-white/80">

        <a href="https://open.spotify.com/artist/0NO4A1y4B8vIdHWtRv5N5q?si=O5c2vscCRIaHfQ81JV1pZA" target="_blank">
          <img src="https://cdn.simpleicons.org/spotify/ffffff" class="w-4 h-4 hover:scale-110 transition">
        </a>
        <a href="https://music.apple.com/us/artist/toni-rams/1553491027" target="_blank">
          <img src="https://cdn.simpleicons.org/applemusic/ffffff" class="w-4 h-4 hover:scale-110 transition">
        </a>
        <a href="https://www.instagram.com/toni_ramadhan_p" target="_blank">
          <img src="https://cdn.simpleicons.org/instagram/ffffff" class="w-4 h-4 hover:scale-110 transition">
        </a>

      </div>

    </div>

  </section>

  <!-- FOOTER -->
  <footer class="absolute bottom-6 w-full text-center text-[10px] opacity-40 z-10">
    &copy; 2026 TONI RAMS. ALL RIGHTS RESERVED.
  </footer>

</body>
</html>
